<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Цалин тооцоолох систем</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      background: #e8edf7;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: #ffffffd9;
      backdrop-filter: blur(4px);
      border-radius: 18px;
      padding: 28px 26px 24px;
      box-shadow:
        0 20px 50px rgba(30, 64, 175, 0.08),
        0 3px 12px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255,255,255,0.7);
    }

    .icon-wrap {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: linear-gradient(180deg, #2d6bff, #1f5be8);
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.28);
    }

    .icon-wrap svg {
      width: 26px;
      height: 26px;
      stroke: #fff;
      stroke-width: 2;
      fill: none;
    }

    .title {
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 2px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #7c8799;
      margin-bottom: 26px;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #374151;
      margin-bottom: 7px;
      font-weight: 500;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      stroke: #9ca3af;
      stroke-width: 2;
      fill: none;
    }

    .input-wrap input {
      width: 100%;
      height: 36px;
      border: 1px solid #e5e7eb;
      background: #f8fafc;
      border-radius: 10px;
      padding: 0 14px 0 38px;
      font-size: 13px;
      color: #4b5563;
      outline: none;
      transition: 0.2s;
    }

    .input-wrap input:focus {
      border-color: #2563eb;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
    }

    .login-btn {
      width: 100%;
      height: 38px;
      border: none;
      border-radius: 11px;
      background: linear-gradient(180deg, #2e6bff, #1f5be8);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 2px;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.22);
      transition: 0.2s;
    }

    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.28);
    }

    .divider {
      height: 1px;
      background: #eceff5;
      margin: 26px 0 18px;
    }

    .accounts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .account-box {
      background: #f7f8fb;
      border: 1px solid #edf0f5;
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 46px;
    }

    .account-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .blue { background: #3b82f6; }
    .orange { background: #f97316; }
    .gray { background: #6b7280; }
    .green { background: #10b981; }

    .blue-text { color: #2563eb; }
    .orange-text { color: #ea580c; }
    .gray-text { color: #4b5563; }
    .green-text { color: #059669; }

    .account-cred {
      font-size: 10px;
      color: #6b7280;
      line-height: 1.3;
      word-break: break-word;
    }

    .employee-box {
      margin-top: 10px;
      background: #f7f8fb;
      border: 1px solid #edf0f5;
      border-radius: 12px;
      text-align: center;
      padding: 10px 12px;
      font-size: 11px;
      color: #6b7280;
    }

    .employee-box strong {
      color: #111827;
      margin-right: 6px;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #8b97aa;
      letter-spacing: 1px;
      font-style: italic;
      text-align: center;
    }

    @media (max-width: 500px) {
      .login-card {
        padding: 22px 18px 20px;
      }

      .accounts-grid {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="login-card">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <rect x="5" y="11" width="14" height="9" rx="2"></rect>
          <path d="M8 11V8a4 4 0 1 1 8 0v3"></path>
        </svg>
      </div>

      <h1 class="title">Цалин тооцоолох систем</h1>
      <p class="subtitle">НЭВТРЭХ ХЭСЭГ</p>

      <div class="form-group">
        <label>Хэрэглэгчийн нэр</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24">
            <path d="M20 21a8 8 0 0 0-16 0"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input type="text" placeholder="admin эсвэл senior_acc" />
        </div>
      </div>

      <div class="form-group">
        <label>Нууц үг</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="11" width="14" height="9" rx="2"></rect>
            <path d="M8 11V8a4 4 0 1 1 8 0v3"></path>
          </svg>
          <input type="password" placeholder="••••••••" />
        </div>
      </div>

      <button class="login-btn">Нэвтрэх</button>

      <div class="divider"></div>

      <div class="accounts-grid">
        <div class="account-box">
          <div class="account-title blue-text">
            <span class="dot blue"></span>
            Гүйцэтгэх удирдлага
          </div>
          <div class="account-cred">admin / admin123</div>
        </div>

        <div class="account-box">
          <div class="account-title orange-text">
            <span class="dot orange"></span>
            Ахлах нягтлан
          </div>
          <div class="account-cred">senior_acc / senior123</div>
        </div>

        <div class="account-box">
          <div class="account-title gray-text">
            <span class="dot gray"></span>
            Нягтлан
          </div>
          <div class="account-cred">accountant / acc123</div>
        </div>

        <div class="account-box">
          <div class="account-title green-text">
            <span class="dot green"></span>
            Хүний нөөц
          </div>
          <div class="account-cred">hr_admin / admin123</div>
        </div>
      </div>

      <div class="employee-box">
        <strong>Ажилтан:</strong> employee / emp123
      </div>
    </div>
  </div>
  <script>
    const users = {
        "hr_admin":   { password: "hr123",   page: "hr.html" },
        "admin":  { password: "admin123",  page: "admin.html" },
        "senior_acc": { password: "senior123", page: "sacc.html" },
        "accountant":   { password: "acc123",   page: "acc.html" },
        "employee":  { password: "emp123",  page: "emp.html" },
    };

    function login(event) {
        event.preventDefault();

        const userId   = document.getElementById("userId").value.trim();
        const password = document.getElementById("password").value;
        const errorMsg = document.getElementById("errorMsg");

        if (users[userId] && users[userId].password === password) {
            errorMsg.style.display = "none";
            window.location.href = users[userId].page; 
        } else {
            errorMsg.style.display = "block";
        }
    }
</script>
</body>
</html>
